<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ── SEO ── -->
  <title>Practice Mode — MTS Mock Test Sets</title>
  <meta name="description" content="Practice MTS exam with topic-wise mock test sets. General Awareness, Numerical Ability, Reasoning and more. Free with instant explanations." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://yourusername.github.io/mts-practice/pages/practice.html" />

  <!-- ── Open Graph ── -->
  <meta property="og:title"       content="MTS Practice Mode — Mock Test Sets" />
  <meta property="og:description" content="Topic-wise MTS practice sets with explanations. Free and offline ready." />
  <meta property="og:url"         content="https://yourusername.github.io/mts-practice/pages/practice.html" />
  <meta property="og:image"       content="../icons/og-image.png" />

  <!-- ── PWA ── -->
  <link rel="manifest"      href="../manifest.json" />
  <meta name="theme-color"  content="#06b6d4" />
  <meta name="mobile-web-app-capable"              content="yes" />
  <meta name="apple-mobile-web-app-capable"        content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="../icons/icon-152x152.png" />

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" href="../icons/icon-72x72.png" />

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ── Styles ── -->
  <link rel="stylesheet" href="../css/root.css" />
  <link rel="stylesheet" href="../css/sets.css" />
  <link rel="stylesheet" href="../css/home.css" />
</head>

<body class="no-select">

  <!-- ── Background Orbs ── -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb--1" style="background: var(--secondary);"></div>
    <div class="orb orb--2"></div>
  </div>

  <!-- ── Page Header ── -->
  <header class="page-header" role="banner">
    <div class="container">
      <div class="page-header__inner">

        <!-- Back -->
        <a href="../index.html" class="back-btn" aria-label="Go back to home">
          ←
        </a>

        <!-- Title -->
        <div class="page-header__info">
          <h1 class="page-header__title">Practice Mode</h1>
          <p class="page-header__sub" id="headerSub">Loading sets...</p>
        </div>

        <!-- Mode badge -->
        <div class="page-header__mode" id="headerMode" aria-label="Current quiz mode">
          <span id="modeEmoji">🎯</span>
          <span id="modeLabel">Exam</span>
        </div>

      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="sets-main" role="main">
    <div class="container page-enter">

      <!-- Section Hero -->
      <div class="section-hero section-hero--practice">
        <div class="section-hero__icon" aria-hidden="true">✏️</div>
        <div class="section-hero__text">
          <h2>Topic-wise Practice</h2>
          <p>Build strong concepts with subject-wise practice sets and detailed explanations</p>
        </div>
      </div>

      <!-- Sets List -->
      <div class="sets-list" id="setsList" role="list" aria-label="Available practice sets">
        <!-- Skeleton loaders -->
        <div class="set-card set-card--loading set-card--practice" aria-hidden="true">
          <div class="set-card__top">
            <div class="set-card__left">
              <div class="set-card__number">1</div>
              <div class="set-card__info">
                <div class="set-card__name">Loading set name...</div>
                <div class="set-card__sub">Loading info</div>
              </div>
            </div>
          </div>
          <div class="set-card__meta">
            <span class="set-card__meta-item">Loading...</span>
          </div>
        </div>
        <div class="set-card set-card--loading set-card--practice" aria-hidden="true">
          <div class="set-card__top">
            <div class="set-card__left">
              <div class="set-card__number">2</div>
              <div class="set-card__info">
                <div class="set-card__name">Loading set name...</div>
                <div class="set-card__sub">Loading info</div>
              </div>
            </div>
          </div>
          <div class="set-card__meta">
            <span class="set-card__meta-item">Loading...</span>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- ── Bottom Nav ── -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <a href="../index.html"   class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🏠</span>
      <span class="bottom-nav__label">Home</span>
    </a>
    <a href="pyq.html"        class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">📋</span>
      <span class="bottom-nav__label">PYQ</span>
    </a>
    <a href="practice.html"   class="bottom-nav__item bottom-nav__item--active" aria-current="page">
      <span class="bottom-nav__icon" aria-hidden="true">✏️</span>
      <span class="bottom-nav__label">Practice</span>
    </a>
    <a href="results.html"    class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">📊</span>
      <span class="bottom-nav__label">Results</span>
    </a>
  </nav>

  <!-- ── Toast ── -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <!-- ── Scripts ── -->
  <script src="../js/pwa.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/manifest-loader.js"></script>
  <script src="../js/mode-toggle.js"></script>
  <script src="../js/sets-page.js"></script>
</body>
</html>
