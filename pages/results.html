<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ── SEO ── -->
  <title>My Results — MTS Prep</title>
  <meta name="description" content="View all your MTS practice results, scores and progress history." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- ── PWA ── -->
  <link rel="manifest"     href="../manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable"              content="yes" />
  <meta name="apple-mobile-web-app-capable"        content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="../icons/icon-152x152.png" />

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" href="../icons/icon-72x72.png" />

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ── Styles ── -->
  <link rel="stylesheet" href="../css/root.css" />
  <link rel="stylesheet" href="../css/results.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/sets.css" />
</head>

<body class="no-select">

  <!-- ── Background Orbs ── -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb--1" style="background:var(--success);"></div>
    <div class="orb orb--2"></div>
  </div>

  <!-- ══════════════════════════════════════
       PAGE HEADER
  ══════════════════════════════════════ -->
  <header class="page-header" role="banner">
    <div class="container">
      <div class="page-header__inner">

        <!-- Back -->
        <a href="../index.html" class="back-btn" aria-label="Go back to home">←</a>

        <!-- Title -->
        <div class="page-header__info">
          <h1 class="page-header__title">My Results</h1>
          <p class="page-header__sub" id="headerSub">Loading results...</p>
        </div>

        <!-- Theme toggle -->
        <button
          class="btn btn--icon btn--ghost"
          id="themeToggle"
          aria-label="Toggle theme"
          title="Toggle theme">
          <span id="themeIcon">🌙</span>
        </button>

      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       MAIN
  ══════════════════════════════════════ -->
  <main class="results-main" role="main">
    <div class="container page-enter">

      <!-- ── Stats Overview ── -->
      <section
        class="stats-overview"
        aria-label="Overall statistics"
        id="statsOverview">

        <div class="stat-card stat-card--attempts">
          <span class="stat-card__icon" aria-hidden="true">🎯</span>
          <span class="stat-card__value" id="statAttempts">—</span>
          <span class="stat-card__label">Total Attempts</span>
        </div>

        <div class="stat-card stat-card--avg">
          <span class="stat-card__icon" aria-hidden="true">📈</span>
          <span class="stat-card__value" id="statAvg">—%</span>
          <span class="stat-card__label">Avg Score</span>
        </div>

        <div class="stat-card stat-card--best">
          <span class="stat-card__icon" aria-hidden="true">🏆</span>
          <span class="stat-card__value" id="statBest">—%</span>
          <span class="stat-card__label">Best Score</span>
        </div>

        <div class="stat-card stat-card--sets">
          <span class="stat-card__icon" aria-hidden="true">📚</span>
          <span class="stat-card__value" id="statSets">—</span>
          <span class="stat-card__label">Sets Done</span>
        </div>

      </section>

      <!-- ── Filter Bar ── -->
      <div class="filter-bar" role="toolbar" aria-label="Filter results">

        <!-- Filter Tabs -->
        <div
          class="filter-tabs"
          role="tablist"
          aria-label="Filter by type">

          <button
            class="filter-tab filter-tab--all filter-tab--active"
            id="filterAll"
            role="tab"
            aria-selected="true"
            data-filter="all">
            All
            <span class="filter-tab__count" id="countAll">0</span>
          </button>

          <button
            class="filter-tab filter-tab--pyq"
            id="filterPyq"
            role="tab"
            aria-selected="false"
            data-filter="pyq">
            PYQ
            <span class="filter-tab__count" id="countPyq">0</span>
          </button>

          <button
            class="filter-tab filter-tab--practice"
            id="filterPractice"
            role="tab"
            aria-selected="false"
            data-filter="practice">
            Practice
            <span class="filter-tab__count" id="countPractice">0</span>
          </button>

        </div>

        <!-- Clear Button -->
        <button
          class="clear-btn"
          id="clearBtn"
          aria-label="Clear all results"
          title="Clear all results">
          🗑️
        </button>

      </div>

      <!-- ── Results List ── -->
      <section
        class="results-list"
        id="resultsList"
        role="list"
        aria-label="Results history"
        aria-live="polite">
        <!-- Rendered by JS -->
      </section>

    </div>
  </main>

  <!-- ── Bottom Nav ── -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <a href="../index.html"   class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🏠</span>
      <span class="bottom-nav__label">Home</span>
    </a>
    <a href="pyq.html"        class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">📋</span>
      <span class="bottom-nav__label">PYQ</span>
    </a>
    <a href="practice.html"   class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">✏️</span>
      <span class="bottom-nav__label">Practice</span>
    </a>
    <a href="results.html"    class="bottom-nav__item bottom-nav__item--active" aria-current="page">
      <span class="bottom-nav__icon" aria-hidden="true">📊</span>
      <span class="bottom-nav__label">Results</span>
    </a>
  </nav>

  <!-- ══════════════════════════════════════
       DETAIL PANEL (Bottom Sheet)
  ══════════════════════════════════════ -->
  <div
    class="detail-panel"
    id="detailPanel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="detailTitle">

    <div class="detail-sheet" id="detailSheet">

      <!-- Handle -->
      <div class="detail-sheet__handle" aria-hidden="true"></div>

      <!-- Header -->
      <div class="detail-sheet__header">
        <h2 class="detail-sheet__title" id="detailTitle">Result Details</h2>
        <button
          class="detail-close"
          id="detailClose"
          aria-label="Close details">
          ✕
        </button>
      </div>

      <!-- Body (rendered by JS) -->
      <div class="detail-sheet__body" id="detailBody">
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════
       CLEAR CONFIRM DIALOG
  ══════════════════════════════════════ -->
  <div
    class="clear-confirm"
    id="clearConfirm"
    role="dialog"
    aria-modal="true"
    aria-labelledby="clearTitle">

    <div class="clear-confirm__dialog">
      <div class="clear-confirm__icon" aria-hidden="true">🗑️</div>
      <h2 class="clear-confirm__title" id="clearTitle">Clear All Results?</h2>
      <p class="clear-confirm__text">
        This will permanently delete all your result history and progress. This cannot be undone.
      </p>
      <div class="clear-confirm__btns">
        <button
          class="btn btn--ghost btn--full"
          id="clearCancelBtn">
          Cancel
        </button>
        <button
          class="btn btn--danger btn--full"
          id="clearConfirmBtn">
          Clear All
        </button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <!-- ── Scripts ── -->
  <script src="../js/pwa.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/manifest-loader.js"></script>
  <script src="../js/results-manager.js"></script>
</body>
</html>
